packages: []
allowBuilds:
  esbuild: true
minimumReleaseAge: 1440
onlyBuiltDependencies:
  - esbuild
# VitePress 1.6.4 が vite ^5.4.14 を要求するが、vite 5 系は GHSA-4w7w-66w2-5vf9（CVE-2026-39365）の patched 版が無く、
# esbuild も 0.24.2 以下で GHSA-67mh-4wv8-2f99 が残るため、両者を patched 系列に強制 override する。
# VitePress が vite 6 以上を直接要求するようになったら撤去できる。
overrides:
  vite: ^6.4.2
  esbuild: ^0.25.0
