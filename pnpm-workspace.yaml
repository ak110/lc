packages: []
allowBuilds:
  esbuild: true
minimumReleaseAge: 1440
onlyBuiltDependencies:
  - esbuild
# VitePress 1.6.4 が vite ^5.4.14 を要求するが、vite 5 系は GHSA-4w7w-66w2-5vf9（CVE-2026-39365）の patched 版が無く、
# esbuild も 0.24.2 以下で GHSA-67mh-4wv8-2f99 が残るため、両者を patched 系列に強制 override する。
# VitePress が vite 6 以上を直接要求するようになったら撤去できる。
# prh 5.4.4 が js-yaml ^3.9.1 を要求するのに対し textlint-rule-prh は prh ^5.4.4 のまま更新されず、
# Dependabot は GHSA-h67p-54hq-rp68（CVE-2026-53550）に対し js-yaml 4.2.0 以上を要求してくる。
# textlint-rule-prh が prh 6 系へ更新されるまでの間、prh 自体を 6 系へ強制 override し、
# 併せて js-yaml を patched 版 4.2.0 以上へ引き上げる（GHSA の脆弱範囲は 4.0.0〜4.1.1 と 3.x 未満）。
overrides:
  vite: ^6.4.2
  esbuild: ^0.25.0
  prh: ^6.0.6
  js-yaml: ^4.2.0
