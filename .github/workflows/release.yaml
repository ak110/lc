name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "バージョンアップの種類"
        required: true
        type: choice
        options:
          - "バグフィックス"
          - "マイナーバージョンアップ"
          - "メジャーバージョンアップ"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $maxAttempts = 30
          $intervalSec = 20
          for ($i = 1; $i -le $maxAttempts; $i++) {
          $conclusion = gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-suites `
            --jq '.check_suites[] | select(.app.slug == "github-actions") | .conclusion' `
            | Select-Object -First 1
          if ($conclusion -eq "success") {
            Write-Host "CI passed."
            exit 0
          }
          if ($conclusion -and $conclusion -ne "null") {
            # 完了しているが success ではない
            Write-Error "CI failed on this commit (status: $conclusion)."
            exit 1
          }
          Write-Host "CI still running... waiting ${intervalSec}s (attempt $i/$maxAttempts)"
          Start-Sleep -Seconds $intervalSec
          }
          Write-Error "Timed out waiting for CI to complete (waited $($maxAttempts * $intervalSec)s)."
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Directory.Build.props から現在のバージョンを取得し、bump種別に応じてインクリメント
      - name: Bump version
        id: version
        shell: pwsh
        run: |
          $propsPath = "Directory.Build.props"
          [xml]$xml = Get-Content $propsPath
          $currentVersion = $xml.Project.PropertyGroup.Version
          $parts = $currentVersion.Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          switch ("${{ inputs.bump }}") {
          "バグフィックス" {
            $patch++
          }
          "マイナーバージョンアップ" {
            $minor++
            $patch = 0
          }
          "メジャーバージョンアップ" {
            $major++
            $minor = 0
            $patch = 0
          }
          }

          $newVersion = "$major.$minor.$patch"
          Write-Host "Version: $currentVersion -> $newVersion"

          # Directory.Build.props を更新
          $xml.Project.PropertyGroup.Version = $newVersion
          $xml.Save((Resolve-Path $propsPath))

          echo "version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet publish src/Launcher/Launcher.csproj -c Release -o publish/

      - name: Copy LICENSE and README
        run: |
          Copy-Item LICENSE publish/
          Copy-Item README.md publish/
        shell: pwsh

      - name: Create ZIP
        shell: pwsh
        run: |
          $zipName = "lc-v${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName

      - name: Commit and tag
        run: |
          git add Directory.Build.props
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" "lc-v${{ steps.version.outputs.version }}.zip" --title "v${{ steps.version.outputs.version }}" --generate-notes
