name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: バージョン番号の更新タイプ
        required: true
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR
        default: PATCH

permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    env:
      # mise・pinact等がGitHub APIを呼び出す際のレート制限（403）回避。
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $maxAttempts = 30
          $intervalSec = 20
          for ($i = 1; $i -le $maxAttempts; $i++) {
            $conclusion = gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-suites `
              --jq='.check_suites[] | select(.app.slug == "github-actions") | .conclusion' `
              | Select-Object -First 1
            if ($conclusion -eq "success") {
              Write-Host "CI passed."
              exit 0
            }
            if ($conclusion -and $conclusion -ne "null") {
              # 完了しているが success ではない
              Write-Error "CI failed on this commit (status: $conclusion)."
              exit 1
            }
            Write-Host "CI still running... waiting ${intervalSec}s (attempt $i/$maxAttempts)"
            Start-Sleep -Seconds $intervalSec
          }
          Write-Error "Timed out waiting for CI to complete (waited $($maxAttempts * $intervalSec)s)."
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check for existing release tag
        id: existing
        shell: pwsh
        run: |
          $tag = git tag --points-at=HEAD | Where-Object { $_ -match '^v\d+\.' } | Select-Object -First 1
          if ($tag) {
            Write-Host "Found existing tag $tag on HEAD, reusing"
            "version=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT
            "rerun=true" >> $env:GITHUB_OUTPUT
          } else {
            "rerun=false" >> $env:GITHUB_OUTPUT
          }

      - name: Setup tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Configure git identity
        if: steps.existing.outputs.rerun != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Directory.Build.props から現在のバージョンを取得し、bump種別に応じてインクリメント
      - name: Bump version
        if: steps.existing.outputs.rerun != 'true'
        id: version
        shell: pwsh
        run: |
          $propsPath = "Directory.Build.props"
          # XmlDocument.Saveは末尾改行を除去するため、ファイル原形を保つ正規表現置換で書き換える
          $content = [IO.File]::ReadAllText($propsPath)
          if ($content -notmatch '<Version>([^<]+)</Version>') {
            throw "Version要素が見つからない: $propsPath"
          }
          $currentVersion = $Matches[1]
          $parts = $currentVersion.Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          switch ("${{ inputs.bump }}") {
          "PATCH" {
            $patch++
          }
          "MINOR" {
            $minor++
            $patch = 0
          }
          "MAJOR" {
            $major++
            $minor = 0
            $patch = 0
          }
          }

          $newVersion = "$major.$minor.$patch"
          Write-Host "Version: $currentVersion -> $newVersion"

          # Directory.Build.props を更新（最初の<Version>要素のみ差し替え）
          $regex = [regex]'<Version>[^<]+</Version>'
          $newContent = $regex.Replace($content, "<Version>$newVersion</Version>", 1)
          [IO.File]::WriteAllText($propsPath, $newContent)

          echo "version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Build
        if: steps.existing.outputs.rerun != 'true'
        run: dotnet publish src/Launcher/Launcher.csproj -c Release -o publish/

      - name: Copy LICENSE and README
        if: steps.existing.outputs.rerun != 'true'
        run: |
          Copy-Item LICENSE publish/
          Copy-Item README.md publish/
        shell: pwsh

      - name: Create ZIP
        if: steps.existing.outputs.rerun != 'true'
        shell: pwsh
        run: |
          $zipName = "lc-v${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName

      - name: Update version.json for GitHub Pages
        if: steps.existing.outputs.rerun != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $json = @{
            tag_name = "v$version"
            download_url = "https://github.com/${{ github.repository }}/releases/download/v$version/lc-v$version.zip"
          } | ConvertTo-Json
          Set-Content -Path "docs/public/version.json" -Value $json

      - name: Commit and tag
        if: steps.existing.outputs.rerun != 'true'
        run: |
          git add Directory.Build.props docs/public/version.json
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - name: Generate release notes
        run: git cliff --latest --strip=header --output=CHANGES.md

      - name: Append changelog link
        shell: pwsh
        run: |
          $version = if ("${{ steps.existing.outputs.rerun }}" -eq "true") {
            "${{ steps.existing.outputs.version }}"
          } else {
            "${{ steps.version.outputs.version }}"
          }
          $tags = git tag --sort=version:refname | Where-Object { $_ -match '^v\d' }
          $prevTag = $tags[-2]
          Add-Content CHANGES.md "`n**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prevTag...v$version"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = if ("${{ steps.existing.outputs.rerun }}" -eq "true") {
            "${{ steps.existing.outputs.version }}"
          } else {
            "${{ steps.version.outputs.version }}"
          }
          $tag = "v$version"
          $asset = "lc-v$version.zip"
          $exists = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists, skipping"
          } else {
            gh release create $tag $asset --title="$tag" --notes-file=CHANGES.md
          }

      - name: Trigger docs deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yaml
