name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "バージョンアップの種類"
        required: true
        type: choice
        options:
          - "バグフィックス"
          - "マイナーバージョンアップ"
          - "メジャーバージョンアップ"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Directory.Build.props から現在のバージョンを取得し、bump種別に応じてインクリメント
      - name: Bump version
        id: version
        shell: pwsh
        run: |
          $propsPath = "Directory.Build.props"
          [xml]$xml = Get-Content $propsPath
          $currentVersion = $xml.Project.PropertyGroup.Version
          $parts = $currentVersion.Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          switch ("${{ inputs.bump }}") {
            "バグフィックス" {
              $patch++
            }
            "マイナーバージョンアップ" {
              $minor++
              $patch = 0
            }
            "メジャーバージョンアップ" {
              $major++
              $minor = 0
              $patch = 0
            }
          }

          $newVersion = "$major.$minor.$patch"
          Write-Host "Version: $currentVersion -> $newVersion"

          # Directory.Build.props を更新
          $xml.Project.PropertyGroup.Version = $newVersion
          $xml.Save((Resolve-Path $propsPath))

          echo "version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet publish src/Launcher/Launcher.csproj -c Release -o publish/

      - name: Create ZIP
        shell: pwsh
        run: |
          $zipName = "らんちゃ-v${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props
          git commit -m "v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" "らんちゃ-v${{ steps.version.outputs.version }}.zip" --title "v${{ steps.version.outputs.version }}" --generate-notes
