[tools]
uv = "latest"
dotnet = "10"
node = "lts"
pnpm = "latest"
pinact = "latest"
git-cliff = "latest"
actionlint = "latest"
typos = "latest"

[tasks.setup]
description = "開発環境のセットアップ"
run = [
  "dotnet tool restore",
  "pnpm install",
  "git config --unset core.hooksPath || true",
  "uvx pre-commit install",
]

[tasks.build]
description = "リリースビルド"
run = [
  "dotnet publish src/Launcher/Launcher.csproj -c Release -o publish",
  "copy LICENSE publish\\ && copy README.md publish\\",
]

[tasks.clean]
description = "ビルド成果物の削除"
run = "dotnet clean Launcher.sln"

[tasks.format]
description = "フォーマット + 軽量lint（開発時の手動実行用。自動修正あり）"
run = [
  "uvx pyfltr fast",
]

[tasks.test]
description = "全チェック実行（これを通過すればコミット可能）"
run = [
  "uvx pyfltr run",
]

[tasks.ci]
description = "CI向け全チェック (差分検知で失敗)"
run = [
  "uvx pyfltr ci",
]

[tasks.update]
description = "依存パッケージの更新"
run = [
  "dotnet tool restore",
  "dotnet outdated -u Launcher.sln",
  "pnpm update --latest",
  "bash -c 'GITHUB_TOKEN=$(gh auth token) pinact run --update --min-age 1'",
]

[tasks.docs]
description = "ドキュメントのローカルプレビュー"
run = "pnpm run docs:dev"
