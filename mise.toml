[tools]
dotnet = "10"
node = "lts"
pnpm = "latest"

[tasks.setup]
run = "pnpm install"

[tasks.build]
run = "dotnet build Launcher.sln --no-incremental"

[tasks.test]
run = "dotnet test Launcher.sln"

[tasks.lint]
depends = ["lint:cs", "lint:docs"]

[tasks."lint:cs"]
run = "dotnet format Launcher.sln --verify-no-changes"

[tasks."lint:docs"]
run = "pnpm run lint"

[tasks.format]
depends = ["format:cs", "format:docs"]

[tasks."format:cs"]
run = "dotnet format Launcher.sln"

[tasks."format:docs"]
run = "pnpm run lint:fix"

[tasks.run]
run = "dotnet run --project src/Launcher/Launcher.csproj"

[tasks.publish]
run = "dotnet publish src/Launcher/Launcher.csproj -c Release -o publish"

[tasks.ci]
depends = ["build", "lint", "test"]

[tasks.coverage]
run = "dotnet test Launcher.sln --collect:\"XPlat Code Coverage\""

[tasks.watch]
run = "dotnet watch test --project src/Launcher.Tests/Launcher.Tests.csproj"

[tasks.clean]
run = "dotnet clean Launcher.sln"
