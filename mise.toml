[tools]
dotnet = "10"
node = "lts"
pnpm = "latest"

# === 日常ワークフロー ===

[tasks.format]
description = "format + build + lint"
run = [
    "dotnet format Launcher.sln",
    "pnpm run lint:fix",
    "dotnet build Launcher.sln --no-incremental",
    "dotnet format Launcher.sln --verify-no-changes",
    "pnpm run lint",
]

[tasks.test]
description = "format + build + lint + test"
run = [
    "dotnet format Launcher.sln",
    "pnpm run lint:fix",
    "dotnet build Launcher.sln --no-incremental",
    "dotnet format Launcher.sln --verify-no-changes",
    "pnpm run lint",
    "dotnet test Launcher.sln",
]

# === 個別タスク ===

[tasks.update]
description = "依存パッケージの最新化"
run = [
    "dotnet tool restore",
    "dotnet outdated -u Launcher.sln",
    "pnpm update --latest",
]

[tasks.setup]
run = ["dotnet tool restore", "pnpm install", "git config core.hooksPath .githooks"]

[tasks.run]
run = "dotnet run --project src/Launcher/Launcher.csproj"

[tasks.watch]
run = "dotnet watch test --project src/Launcher.Tests/Launcher.Tests.csproj"

[tasks.coverage]
run = "dotnet test Launcher.sln --collect:\"XPlat Code Coverage\""

[tasks.publish]
run = [
    "dotnet publish src/Launcher/Launcher.csproj -c Release -o publish",
    "copy LICENSE publish\\ && copy README.md publish\\",
]

[tasks.clean]
run = "dotnet clean Launcher.sln"

[tasks.docs]
description = "ドキュメントのローカルプレビュー"
run = "pnpm run docs:dev"
